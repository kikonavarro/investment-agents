# Filtros mínimos de liquidez (aplicados en leaps_scanner.py)
liquidity:
  min_open_interest: 100      # contratos
  max_spread_pct: 0.05        # bid-ask spread relativo al mid (5%)
  min_volume_underlying: 1000000  # acciones/día

# Criterios LEAP
leap_criteria:
  min_dte: 365                # vencimiento mínimo (días)
  max_dte: 800                # ~2 años, evita iliquidez extrema
  delta_min: 0.60
  delta_max: 0.80

# Earnings exclusion
earnings_exclusion_days: 14
