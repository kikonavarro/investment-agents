name: Deploy Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'data/valuations/**'
      - 'tools/web_dashboard.py'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout investment-agents repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate dashboard
        run: python tools/web_dashboard.py

      - name: Checkout dashboard repo
        uses: actions/checkout@v4
        with:
          repository: kikonavarro/investment-dashboard
          token: ${{ secrets.INVESTMENT_DASHBOARD_TOKEN }}
          path: ./dashboard-repo

      - name: Copy generated HTML
        run: cp data/dashboard.html ./dashboard-repo/index.html

      - name: Create styles directory and copy CSS
        run: |
          mkdir -p ./dashboard-repo/assets
          cp data/dashboard.html ./dashboard-repo/

      - name: Commit and push to dashboard repo
        working-directory: ./dashboard-repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git diff --cached --quiet || (git commit -m "Update dashboard — $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

      - name: Verify deployment
        run: echo "✅ Dashboard deployed to https://kikonavarro.github.io/investment-dashboard"
